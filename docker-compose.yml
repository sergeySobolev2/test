version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: partition_postgres
    environment:
      POSTGRES_USER: partition_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: partition
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - partition_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: partition_redis
    ports:
      - "6380:6379"
    networks:
      - partition_network

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: partition_minio
    command: server /data --console-address ":9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data
    networks:
      - partition_network

  minio-init:
    image: minio/mc:latest
    container_name: partition_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/image --ignore-existing;
      /usr/bin/mc anonymous set download myminio/image;
      exit 0;
      "
    networks:
      - partition_network

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: partition_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: partition_user
      DB_PASSWORD: 123
      DB_NAME: partition
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: image
      ASYNC_SERVICE_URL: http://asyncservice:8000
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - partition_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
    container_name: partition_frontend
    ports:
      - "5196:5196"
    depends_on:
      - backend
    networks:
      - partition_network

volumes:
  postgres_data:
  minio_data:

networks:
  partition_network:
    driver: bridge
